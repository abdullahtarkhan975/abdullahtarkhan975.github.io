name: Deploy Web App

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Choose environment"
        required: true
        type: choice
        options:
          - test
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Build dist folder + generate config.js inside it
      - name: Build project
        run: |
          mkdir dist

          # Copy all project files into dist
          cp -r . dist

          # Choose webhook based on environment
          if [ "${{ github.event.inputs.env }}" = "prod" ]; then
            WEBHOOK="https://nonvillainously-lymphoblastic-susan.ngrok-free.dev/webhook/c7bd9b6b-5edc-4625-b8c0-1c3254d8af4b"
          else
            WEBHOOK="https://nonvillainously-lymphoblastic-susan.ngrok-free.dev/webhook-test/c7bd9b6b-5edc-4625-b8c0-1c3254d8af4b"
          fi

          # Generate config.js inside dist
          sed "s|__WEBHOOK__|$WEBHOOK|g" config.template.js > dist/config.js

      # 3. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist