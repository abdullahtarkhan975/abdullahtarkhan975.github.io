<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة النور</title>
    <div class="radio-group" style="margin-top: 10px; font-size: 14px;">
        <label>
            <input type="radio" name="env" value="test" checked>
            Test
        </label>

        <label>
            <input type="radio" name="env" value="prod">
            Publish
        </label>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="header">
        <h2>🌟 منصة النور</h2>
    </div>

    <div id="app">

        <!-- country -->
        <div id="step-country" class="step active">
            <label>📍 اختر الدولة:</label>
            <select id="country"></select>
        </div>

        <!-- stage -->
        <div id="step-stage" class="step">
            <label>🏫 المرحلة:</label>
            <select id="stage" disabled></select>
        </div>

        <!-- grade -->
        <div id="step-grade" class="step">
            <label>📚 الصف:</label>
            <select id="grade" disabled></select>
        </div>

        <!-- branch -->
        <div id="step-branch" class="step">
            <label>⚖️ الفرع:</label>
            <select id="branch"></select>
        </div>

        <!-- subject -->
        <div id="step-subject" class="step">
            <label>📘 المادة:</label>
            <select id="subject"></select>
        </div>

        <!-- semester -->
        <div id="step-semester" class="step">
            <label>📅 الفصل:</label>
            <select id="semester">
                <option value="">-- اختر --</option>
                <option value="S1">الفصل الأول</option>
                <option value="S2">الفصل الثاني</option>
            </select>
        </div>

        <!-- unit -->
        <div id="step-unit" class="step">
            <label>🗂️ الوحدة:</label>
            <select id="unit"></select>
        </div>

        <!-- lesson -->
        <div id="step-lesson" class="step">
            <label>📖 الدرس:</label>
            <select id="lesson"></select>
        </div>

        <!-- final -->
        <div id="step-final" class="step">
            <button id="submitBtn">إرسال 🚀</button>
        </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
