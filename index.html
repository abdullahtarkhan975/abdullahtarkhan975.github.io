<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة النور للتلخيص الذكي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; direction: rtl; background: #fdfdfd; color: #333; text-align: right; }
        .header { background: #0088cc; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
        select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; background: white; outline: none; }
        .step { display: none; padding: 10px; border-bottom: 1px solid #eee; }
        .step.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        button.send-btn { width: 100%; padding: 15px; margin-top: 25px; border-radius: 12px; background: #27ae60; color: white; font-size: 18px; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }

        /* Spinner */
        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid #ddd;
            border-top: 4px solid #27ae60;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div class="header">
    <h2>🌟 منصة النور التعليمية</h2>
    <p>مشروع النور للتلخيص الذكي</p>
</div>

<div id="step-country" class="step active">
    <label>📍 اختر الدولة:</label>
    <select id="country" onchange="updateStages()">
        <option value="">-- اختر الدولة --</option>
        <option value="JO">الأردن 🇯🇴</option>
        <option value="QA">قطر 🇶🇦</option>
        <option value="SA">السعودية 🇸🇦</option>
    </select>
</div>

<div id="step-stage" class="step">
    <label>🏫 المرحلة الدراسية:</label>
    <select id="stage" onchange="updateGrades()">
        <option value="">-- اختر المرحلة --</option>
    </select>
</div>

<div id="step-grade" class="step">
    <label>📚 الصف الدراسي:</label>
    <select id="grade" onchange="handleGradeLogic()">
        <option value="">-- اختر الصف --</option>
    </select>
</div>

<div id="step-branch" class="step">
    <label>⚖️ الفرع/المسار الدراسية:</label>
    <select id="branch" onchange="updateSubjects()">
        <option value="">-- اختر --</option>
    </select>
</div>

<div id="step-subject" class="step">
    <label>📘 المادة الدراسية:</label>
    <select id="subject" onchange="showNext('step-semester')">
        <option value="">-- اختر المادة --</option>
    </select>
</div>

<div id="step-semester" class="step">
    <label>📅 الفصل الدراسي:</label>
    <select id="semester" onchange="showNext('step-unit')">
        <option value="">-- اختر الفصل --</option>
        <option value="S1">الفصل الأول</option>
        <option value="S2">الفصل الثاني</option>
        <option value="S3">الفصل الثالث (للسعودية)</option>
    </select>
</div>

<div id="step-unit" class="step">
    <label>🗂️ الوحدة:</label>
    <select id="unit" onchange="showNext('step-lesson')">
        <option value="">-- اختر الوحدة --</option>
        <script>for(let i=1; i<=12; i++) document.write(`<option value="U${i}">الوحدة ${i}</option>`);</script>
    </select>
</div>

<div id="step-lesson" class="step">
    <label>📖 الدرس:</label>
    <select id="lesson" onchange="showNext('step-final')">
        <option value="">-- اختر الدرس --</option>
        <script>for(let i=1; i<=25; i++) document.write(`<option value="${i}">الدرس ${i}</option>`);</script>
    </select>
</div>

<div id="step-final" class="step">
    <div id="loading" style="display:none; text-align:center; margin-top:15px;">
        <div class="spinner"></div>
    </div>
    <button id="submitBtn" class="send-btn" onclick="submitData()">تأكيد وإرسال لـ Beelink 🚀</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const subjectMap = {
    'الفيزياء': 'PHY', 'الرياضيات': 'MATH', 'الإنجليزية': 'ENG', 'العربية': 'ARB', 
    'الدين': 'ISL', 'الأحياء': 'BIO', 'الكيمياء': 'CHEM', 'تقنية رقمية': 'DIGIT', 
    'علم الحاسوب': 'CS', 'تكنولوجيا المعلومات': 'IT', 'العلوم': 'SCI',
    'الاجتماعيات': 'SOCST', 'التاريخ': 'HIS', 'الجغرافيا': 'GEO',
    'الإدارة': 'MGMT', 'المحاسبة': 'ACC', 'القانون': 'LAW', 'الاقتصاد': 'ECON',
    'التفسير': 'TAF', 'الحديث': 'HAD', 'الفقه': 'FIQ', 'الدراسات النفسية': 'PSY'
};

const stageCodeMap = {
    'secondary': 'S', 'preparatory': 'P', 'intermediate': 'P', 'elementary': 'E', 'basic': 'E'
};

function showNext(id) {
    const el = document.getElementById(id);
    if(el) el.classList.add('active');
}

function updateStages() {
    const country = document.getElementById('country').value;
    const stageSelect = document.getElementById('stage');
    stageSelect.innerHTML = '<option value="">-- اختر المرحلة --</option>';

    if (country === 'JO') {
        stageSelect.innerHTML += '<option value="basic">المرحلة الأساسية</option><option value="secondary">المرحلة الثانوية</option>';
    } else if (country === 'SA') {
        stageSelect.innerHTML += '<option value="elementary">الابتدائية</option><option value="intermediate">المتوسطة</option><option value="secondary">الثانوية</option>';
    } else if (country === 'QA') {
        stageSelect.innerHTML += '<option value="elementary">الابتدائية</option><option value="preparatory">الإعدادية</option><option value="secondary">الثانوية</option>';
    }

    showNext('step-stage');
}

function updateGrades() {
    const stage = document.getElementById('stage').value;
    const country = document.getElementById('country').value;
    const gradeSelect = document.getElementById('grade');

    gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>';

    if (country === 'QA') {
        if (stage === 'elementary') for(let i=1;i<=6;i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i}</option>`;
        else if (stage === 'preparatory') for(let i=7;i<=9;i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i}</option>`;
        else for(let i=10;i<=12;i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i}</option>`;
    }

    showNext('step-grade');
}

async function submitData() {
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');

    btn.disabled = true;
    btn.innerText = "جاري الإرسال...";
    loading.style.display = 'block';

    try {
        await fetch("YOUR_WEBHOOK_URL", { method: "POST" });

        tg.showPopup({
            title: 'منصة النور',
            message: 'تم إرسال ملفك بنجاح 📄 يمكنك إغلاق هذه النافذة لتحميله من المحادثة'
        }, () => tg.close());

    } catch (e) {
        tg.showAlert("⚠️ فشل الإرسال");
        btn.disabled = false;
        btn.innerText = "تأكيد وإرسال لـ Beelink 🚀";
    } finally {
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
