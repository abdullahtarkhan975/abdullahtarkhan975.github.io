<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة النور للتلخيص الذكي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; direction: rtl; background: #fdfdfd; color: #333; text-align: right; }
        .header { background: #0088cc; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
        select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; background: white; outline: none; }
        .step { display: none; padding: 10px; border-bottom: 1px solid #eee; }
        .step.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        button.send-btn { width: 100%; padding: 15px; margin-top: 25px; border-radius: 12px; background: #27ae60; color: white; font-size: 18px; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="header">
    <h2>🌟 منصة النور التعليمية</h2>
    <p>مشروع النور للتلخيص الذكي</p>
</div>

<div id="step-country" class="step active">
    <label>📍 اختر الدولة:</label>
    <select id="country" onchange="updateStages()">
        <option value="">-- اختر الدولة --</option>
        <option value="JO">الأردن 🇯🇴</option>
        <option value="QA">قطر 🇶🇦</option>
        <option value="SA">السعودية 🇸🇦</option>
    </select>
</div>

<div id="step-stage" class="step">
    <label>🏫 المرحلة الدراسية:</label>
    <select id="stage" onchange="updateGrades()">
        <option value="">-- اختر المرحلة --</option>
    </select>
</div>

<div id="step-grade" class="step">
    <label>📚 الصف الدراسي:</label>
    <select id="grade" onchange="handleGradeLogic()">
        <option value="">-- اختر الصف --</option>
    </select>
</div>

<div id="step-branch" class="step">
    <label id="branch-label">⚖️ الفرع/المسار الدراسية:</label>
    <select id="branch" onchange="updateSubjects()">
        <option value="">-- اختر --</option>
    </select>
</div>

<div id="step-subject" class="step">
    <label>📘 المادة الدراسية:</label>
    <select id="subject" onchange="showNext('step-semester')">
        <option value="">-- اختر المادة --</option>
    </select>
</div>

<div id="step-semester" class="step">
    <label>📅 الفصل الدراسي:</label>
    <select id="semester" onchange="showNext('step-unit')">
        <option value="">-- اختر الفصل --</option>
        <option value="S1">الفصل الأول</option>
        <option value="S2">الفصل الثاني</option>
        <option value="S3">الفصل الثالث (للسعودية)</option>
    </select>
</div>

<div id="step-unit" class="step">
    <label>🗂️ الوحدة:</label>
    <select id="unit" onchange="showNext('step-lesson')">
        <option value="">-- اختر الوحدة --</option>
        <script>for(let i=1; i<=12; i++) document.write(`<option value="U${i}">الوحدة ${i}</option>`);</script>
    </select>
</div>

<div id="step-lesson" class="step">
    <label>📖 الدرس:</label>
    <select id="lesson" onchange="showNext('step-final')">
        <option value="">-- اختر الدرس --</option>
        <script>for(let i=1; i<=25; i++) document.write(`<option value="${i}">الدرس ${i}</option>`);</script>
    </select>
</div>

<div id="step-final" class="step">
    <button id="submitBtn" class="send-btn" onclick="submitData()">تأكيد وإرسال لـ Beelink 🚀</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// خريطة الأكواد البرمجية للمواد (للتوافق مع ملفات السيرفر)
const subjectMap = {
    'الفيزياء': 'PHY', 'الرياضيات': 'MATH', 'الإنجليزية': 'ENG', 'العربية': 'ARB', 
    'الدين': 'ISL', 'الأحياء': 'BIO', 'الكيمياء': 'CHEM', 'تقنية رقمية': 'DIGIT', 
    'علم الحاسوب': 'CS', 'تكنولوجيا المعلومات': 'IT', 'العلوم': 'SCI',
    'الاجتماعيات': 'SOCST', 'التاريخ': 'HIS', 'الجغرافيا': 'GEO',
    'الإدارة': 'MGMT', 'المحاسبة': 'ACC', 'القانون': 'LAW', 'الاقتصاد': 'ECON',
    'التفسير': 'TAF', 'الحديث': 'HAD', 'الفقه': 'FIQ', 'الدراسات النفسية': 'PSY'
};

const stageCodeMap = {
    'secondary': 'S', 'preparatory': 'P', 'intermediate': 'P', 'elementary': 'E', 'basic': 'E'
};

function showNext(id) {
    const el = document.getElementById(id);
    if(el) el.classList.add('active');
}

function updateStages() {
    const country = document.getElementById('country').value;
    const stageSelect = document.getElementById('stage');
    stageSelect.innerHTML = '<option value="">-- اختر المرحلة --</option>';
    if (country === 'JO') {
        stageSelect.innerHTML += '<option value="basic">المرحلة الأساسية</option><option value="secondary">المرحلة الثانوية</option>';
    } else if (country === 'SA') {
        stageSelect.innerHTML += '<option value="elementary">الابتدائية</option><option value="intermediate">المتوسطة</option><option value="secondary">الثانوية (نظام المسارات)</option>';
    } else if (country === 'QA') {
        stageSelect.innerHTML += '<option value="elementary">الابتدائية</option><option value="preparatory">الإعدادية</option><option value="secondary">الثانوية</option>';
    }
    showNext('step-stage');
}

function updateGrades() {
    const stage = document.getElementById('stage').value;
    const country = document.getElementById('country').value;
    const gradeSelect = document.getElementById('grade');
    gradeSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
    if (country === 'JO') {
        if (stage === 'basic') for(let i=1; i<=10; i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i}</option>`;
        else gradeSelect.innerHTML += '<option value="G11">أول ثانوي (11)</option><option value="G12">توجيهي (12)</option>';
    } else if (country === 'SA') {
        if (stage === 'elementary') for(let i=1; i<=6; i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i} ابتدائي</option>`;
        else if (stage === 'intermediate') for(let i=1; i<=3; i++) gradeSelect.innerHTML += `<option value="G${i+6}">الصف ${i} متوسط</option>`;
        else for(let i=1; i<=3; i++) gradeSelect.innerHTML += `<option value="G${i+9}">السنة ${i} ثانوي</option>`;
    } else if (country === 'QA') {
        if (stage === 'elementary') for(let i=1; i<=6; i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i}</option>`;
        else if (stage === 'preparatory') for(let i=7; i<=9; i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i}</option>`;
        else for(let i=10; i<=12; i++) gradeSelect.innerHTML += `<option value="G${i}">الصف ${i}</option>`;
    }
    showNext('step-grade');
}

function handleGradeLogic() {
    const grade = document.getElementById('grade').value;
    const country = document.getElementById('country').value;
    const gNum = parseInt(grade.replace('G', ''));
    const branchStep = document.getElementById('step-branch');
    const branchSelect = document.getElementById('branch');

    if (gNum >= 10) { 
        branchStep.classList.add('active');
        if (country === 'SA') {
            branchSelect.innerHTML = `
                <option value="">-- اختر المسار السعودي --</option>
                <option value="GEN">المسار العام</option>
                <option value="HEALTH">مسار الصحة والحياة</option>
                <option value="ENGIN">مسار الهندسة والحاسب</option>
                <option value="BUS">مسار إدارة الأعمال</option>
                <option value="LAW">المسار الشرعي</option>
            `;
        } else {
            branchSelect.innerHTML = `<option value="">-- اختر الفرع --</option><option value="SCI">علمي</option><option value="ART">أدبي</option><option value="TECH">تكنولوجيا</option>`;
        }
    } else {
        branchSelect.innerHTML = '<option value="GEN">عام</option>';
        branchSelect.value = "GEN";
        branchStep.classList.remove('active');
        updateSubjects();
    }
}

function updateSubjects() {
    const subSelect = document.getElementById('subject');
    const grade = document.getElementById('grade').value;
    const branch = document.getElementById('branch').value;
    const country = document.getElementById('country').value;
    const gNum = parseInt(grade.replace('G', ''));
    
    subSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
    let subs = ['العربية', 'الإنجليزية', 'الرياضيات', 'الدين'];

    if (gNum <= 10 && country !== 'SA') {
        subs.push('العلوم', 'الاجتماعيات', 'تقنية رقمية');
    } else if (country === 'SA' && gNum < 10) {
        subs.push('العلوم', 'الاجتماعيات', 'تقنية رقمية');
    } else {
        if (country === 'SA') {
            if (branch === 'GEN') subs.push('الأحياء', 'الفيزياء', 'الكيمياء', 'تقنية رقمية', 'التاريخ');
            else if (branch === 'HEALTH') subs.push('الأحياء', 'الكيمياء', 'تقنية رقمية');
            else if (branch === 'ENGIN') subs.push('الفيزياء', 'علم البيانات', 'الأمن السيبراني');
            else if (branch === 'BUS') subs.push('الإدارة', 'المحاسبة', 'القانون', 'الاقتصاد');
            else if (branch === 'LAW') subs.push('التفسير', 'الحديث', 'الفقه', 'الدراسات النفسية');
        } else {
            if (branch === 'SCI') subs.push('الفيزياء', 'الكيمياء', 'الأحياء', 'الحاسوب');
            else if (branch === 'ART') subs.push('العلوم', 'التاريخ', 'الجغرافيا', 'الحاسوب');
            else if (branch === 'TECH') subs.push('الفيزياء', 'علم الحاسوب', 'تكنولوجيا المعلومات');
        }
    }

    const uniqueSubs = [...new Set(subs)];
    uniqueSubs.forEach(s => subSelect.innerHTML += `<option value="${s}">${s}</option>`);
    showNext('step-subject');
}

async function submitData() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    const country = document.getElementById('country').value;
    const stage = stageCodeMap[document.getElementById('stage').value] || 'X';
    const grade = document.getElementById('grade').value;
    const branch = document.getElementById('branch').value;
    const subAr = document.getElementById('subject').value;
    const subEn = subjectMap[subAr] || 'SUB';
    const semester = document.getElementById('semester').value;
    const unit = document.getElementById('unit').value;
    const lesson = document.getElementById('lesson').value;

    const finalCode = `${country}-${stage}-${grade}-${branch}-${subEn}-${semester}-${unit}-L${lesson}`;
    const webhookUrl = 'https://nonvillainously-lymphoblastic-susan.ngrok-free.dev/webhook/c7bd9b6b-5edc-4625-b8c0-1c3254d8af4b';

    try {
        await fetch(webhookUrl, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                user_id: tg.initDataUnsafe?.user?.id || "unknown", 
                full_code: finalCode, 
                subject: subAr, 
                lesson: lesson 
            })
        });
        tg.showPopup({ title: 'منصة النور', message: 'تم إرسال الكود: ' + finalCode }, () => tg.close());
    } catch (e) {
        tg.showAlert("⚠️ فشل الإرسال");
        btn.disabled = false;
    }
}
</script>
</body>
</html>
